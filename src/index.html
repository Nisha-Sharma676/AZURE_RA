<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Review Analyser — AI Enhanced</title>

<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: "Work Sans", sans-serif;
  margin: 0;
  background: #1E3B2F;
  color: #fff;
}

header {
  text-align: center;
  padding: 40px;
}

textarea {
  width: 90%;
  height: 120px;
  margin: 20px auto;
  display: block;
  padding: 10px;
  font-size: 16px;
}

button {
  display: block;
  margin: 10px auto;
  padding: 10px 20px;
  cursor: pointer;
}

.sheet {
  background: #F6F4EC;
  color: #000;
  margin: 20px auto;
  padding: 20px;
  width: 90%;
  border-radius: 8px;
}

.sheet-label {
  font-weight: bold;
  margin-top: 10px;
}

.marked-text mark {
  background: yellow;
}
.entity-chip {
  display:inline-block;
  background:#1E3B2F;
  color:white;
  padding:4px 8px;
  margin:2px;
  border-radius:5px;
}
</style>
</head>

<body>

<header>
  <h1>Review Analyser</h1>
</header>

<textarea
  id="reviewInput"
  placeholder='Enter a review (e.g., "This product is amazing but delivery was late.")'>
</textarea>
<button id="analyzeBtn">Analyze</button>

<div id="results" class="sheet" hidden>

  <h3>Sentiment: <span id="sentiment"></span></h3>

  <div>
    <strong>Language:</strong>
    <p id="langText"></p>
  </div>

  <div>
    <strong>PII Redacted Text:</strong>
    <p id="piiText"></p>
  </div>

  <div>
    <strong>Summary:</strong>
    <p id="summaryText"></p>
  </div>

  <div>
    <strong>Marked Text:</strong>
    <p id="markedText"></p>
  </div>

  <div>
    <strong>Entities:</strong>
    <div id="entityList"></div>
  </div>

</div>

<script>
const btn = document.getElementById("analyzeBtn");

btn.addEventListener("click", async () => {
  const text = document.getElementById("reviewInput").value;

  const res = await fetch("https://proud-moss-010e59500.7.azurestaticapps.net/api/analyze", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ text })
  });

  const data = await res.json();
  console.log(data);

  document.getElementById("results").hidden = false;

  document.getElementById("sentiment").textContent = data.sentiment;

  document.getElementById("langText").textContent =
    data.language?.name || data.language || "N/A";

  document.getElementById("piiText").textContent =
    data.piiRedactedText || "No PII detected";

  document.getElementById("summaryText").textContent =
    data.summary || "No summary";

  document.getElementById("markedText").innerHTML =
    data.piiRedactedText || text;

  const entityDiv = document.getElementById("entityList");
  entityDiv.innerHTML = "";

  (data.entities || []).forEach(e => {
    const span = document.createElement("span");
    span.className = "entity-chip";
    span.textContent = e.text + " (" + e.category + ")";
    entityDiv.appendChild(span);
  });
});
</script>

</body>
</html>
